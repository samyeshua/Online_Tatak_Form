<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | UC Online Tatak Forms</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="655609284_1426759675272887_2726655014418430573_n.png"" alt="UC-SAS-Logo" class="side-logo">
                <div class="side-title">
                    <strong>ADMIN DASHBOARD</strong>
                    <span>ACCESS SYSTEM</span>
                </div>
            </div>

            <nav class="side-nav">
                <p class="nav-label">MAIN MENU</p>
                <a href="#" class="nav-item active" onclick="showSection('overview', this)">
                    <i class="fas fa-th-large"></i> Overview
                </a>
                <a href="#" class="nav-item" onclick="showSection('events', this)">
                    <i class="fas fa-calendar-alt"></i> Events
                </a>
                <a href="#" class="nav-item" onclick="showSection('organization', this)">
                    <i class="fas fa-university"></i> Organization
                </a>
                <a href="#" class="nav-item" onclick="showSection('officers', this)">
                    <i class="fas fa-user-shield"></i> Officers
                </a>
                <a href="#" class="nav-item" onclick="showSection('students', this)">
                    <i class="fas fa-user-graduate"></i> Students
                </a>
                <a href="#" class="nav-item" onclick="showSection('reports', this)">
                    <i class="fas fa-chart-bar"></i> Reports
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="login.html" class="logout-link">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <div class="header-welcome">
                    <h1 id="main-title">HELLO, <span class="text-gold">ADMIN</span></h1>
                    <p id="sub-title">Friday, February 27, 2026 — 2nd Semester A.Y 2025-2026</p>
                </div>
                <div class="header-controls">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Search anything....">
                    </div>
                    <button class="icon-btn"><i class="far fa-bell"></i></button>
                    <button class="btn-primary" id="action-btn">+ New Event</button>
                </div>
            </header>

            <div id="dynamic-content">
                </div>
        </main>
    </div>
    <div id="logoutModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="logout-icon-container">
                <i class="fas fa-sign-out-alt"></i>
            </div>
            <h2>Confirm Logout</h2>
            <p>You are about to sign out the<br><strong>UC Admin Access System</strong>.</p>
            <div class="modal-actions">
                <button id="stayLoggedIn" class="btn-secondary">Stay Logged In</button>
                <button id="confirmLogout" class="btn-danger">Yes, Logout</button>
            </div>
        </div>
    </div>
    <div id="addOfficerModal" class="modal-overlay" style="display: none;">
        <div class="modal-content add-form-modal">
            <div class="modal-header-dark">
                <h3>Add Officer</h3>
                <p>Fill in the details below.</p>
                <div class="avatar-upload-placeholder"></div>
            </div>
            <form id="officerForm" class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>FIRST NAME</label>
                        <input type="text" id="offFirstName" placeholder="Enter first name" required>
                    </div>
                    <div class="form-group">
                        <label>LAST NAME</label>
                        <input type="text" id="offLastName" placeholder="Enter last name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>POSITION</label>
                    <input type="text" id="offPosition" placeholder="e.g. President" required>
                </div>
                <div class="form-group">
                    <label>ORGANIZATION</label>
                    <select id="offOrg" required>
                        <option value="PSITS">PSITS</option>
                        <option value="SSG">SSG</option>
                        <option value="CSPS">CSP-S</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>TERM START</label>
                        <input type="date" id="offStart" required>
                    </div>
                    <div class="form-group">
                        <label>TERM END</label>
                        <input type="date" id="offEnd" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>STATUS</label>
                    <select id="offStatus">
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn-save">Save officer</button>
                    <button type="button" class="btn-cancel" onclick="closeModal('addOfficerModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
